  <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
   <defs>
    <!-- Глубокий градиент заднего фона (Стиль Windows 11 Fluent) -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0F172A" />
      <stop offset="40%" stop-color="#1E1B4B" />
      <stop offset="100%" stop-color="#311042" />
    </linearGradient>

    <!-- Неоновый бирюзовый градиент для знака Bluetooth -->
    <linearGradient id="btGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>

    <!-- Градиент для волн радара -->
    <linearGradient id="radarGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE" stop-opacity="0.8" />
      <stop offset="100%" stop-color="#818CF8" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <!-- Замена тени на честную темную подложку со смещением (Эффект объема) -->
  <rect x="32" y="44" width="448" height="448" rx="110" fill="#020617" opacity="0.6" />

  <!-- Основная подложка-суперэллипс (ФОН) — теперь без фильтров, не исчезнет! -->
  <rect x="32" y="32" width="448" height="448" rx="110" fill="url(#bgGrad)" stroke="#475569" stroke-width="3" stroke-opacity="0.4" />

  <!-- Группа элементов РАДАРНЫХ ВОЛН -->
  <g transform="translate(256, 256)" opacity="0.85">
    <!-- Внешнее кольцо радара -->
    <circle r="180" fill="none" stroke="url(#radarGrad)" stroke-width="4" stroke-dasharray="16 12" />
    <!-- Среднее кольцо радара -->
    <circle r="130" fill="none" stroke="url(#radarGrad)" stroke-width="3" opacity="0.6" />
    <!-- Внутреннее кольцо радара -->
    <circle r="80" fill="none" stroke="url(#radarGrad)" stroke-width="2" opacity="0.4" stroke-dasharray="4 4" />
    
    <!-- Декоративные перекрестия визира сканера -->
    <line x1="-195" y1="0" x2="-165" y2="0" stroke="#22D3EE" stroke-width="2" opacity="0.5" />
    <line x1="165" y1="0" x2="195" y2="0" stroke="#22D3EE" stroke-width="2" opacity="0.5" />
    <line x1="0" y1="-195" x2="0" y2="-165" stroke="#22D3EE" stroke-width="2" opacity="0.5" />
    <line x1="0" y1="165" x2="0" y2="195" stroke="#22D3EE" stroke-width="2" opacity="0.5" />
  </g>

  <!-- Центральный элемент: Геометрически точный знак BLUETOOTH -->
  <path d="M 256,90 
           V 422 
           L 340,338 
           L 190,214 
           L 322,122 
           Z 
           M 256,158 
           L 294,185 
           L 256,216 
           Z 
           M 256,296 
           L 294,265 
           L 256,236 
           Z" 
        fill="url(#btGrad)" 
        stroke="#E0F2FE" 
        stroke-width="3" 
        stroke-linejoin="round" 
        stroke-linecap="round" />

  <!-- Декоративные точки захваченных сигналов (Свечение заменено полупрозрачными дублями большего радиуса) -->
  <circle cx="360" cy="160" r="18" fill="#22D3EE" opacity="0.2" />
  <circle cx="360" cy="160" r="9" fill="#22D3EE" />
  
  <circle cx="150" cy="340" r="12" fill="#38BDF8" opacity="0.15" />
  <circle cx="150" cy="340" r="6" fill="#38BDF8" opacity="0.8" />
</svg>